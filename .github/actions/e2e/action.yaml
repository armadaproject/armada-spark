name: E2E
author: EnricoMi
description: Github Action to run end-to-end tests against a Spark and Scala version

inputs:
  spark_version:
    description: Spark version to build against
    required: true
  scala_version:
    description: Scala version to build with
    required: true
  java_version:
    description: Java version to build with
    required: true

runs:
  using: composite
  steps:
  - name: Checkout
    uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    with:
      path: armada-spark

  - name: Restore Maven packages cache
    uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
    with:
      path: ~/.m2/repository
      key: ${{ runner.os }}-mvn-e2e-${{ inputs.spark_version }}-${{ inputs.scala_version }}-${{ hashFiles('armada-spark/pom.xml') }}

  - name: Move docker
    run: |
      echo "::group::moving Docker"
      # Stop both the socket and the service to prevent auto-restart
      sudo systemctl stop docker.socket docker.service
      
      # Now move the directory
      sudo mv /var/lib/docker /var/lib/docker.old
      sudo ln -s /mnt/docker /var/lib/docker
      
      # Restart the service
      sudo systemctl start docker
      df -h /mnt
      echo "::endgroup::"
    shell: bash

  - name: Setup JDK
    uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
    with:
      java-version: ${{ inputs.java_version }}
      distribution: 'zulu'

  - name: Set environment
    working-directory: armada-spark
    run: |
      echo "SPARK_VERSION=${{ inputs.spark_version }}" >> $GITHUB_ENV
      echo "SCALA_VERSION=${{ inputs.scala_version }}" >> $GITHUB_ENV
    shell: bash

  - name: Build package
    working-directory: armada-spark
    run: |
      source ./scripts/init.sh
      mvn --batch-mode clean package -P$MAVEN_PROFILES
    shell: bash

  - name: Build image
    working-directory: armada-spark
    env:
      JAVA_VERSION: ${{ inputs.java_version }}
    run: |
      ./scripts/createImage.sh -p -e
    shell: bash

  - name: Test job processing
    working-directory: armada-spark
    run: |
      ./scripts/dev-e2e.sh -q test
    shell: bash
