name: Build
author: EnricoMi
description: Github Action to build this project against a Spark and Scala version

inputs:
  spark_version:
    description: Spark version to build against, e.g. "3.5.5" or "4.1.0-SNAPSHOT"
    required: true
  scala_version:
    description: Scala version to build with, e.g. "2.13.8"
    required: true
  java_version:
    description: Java version to build with, e.g. "11"
    required: true

runs:
  using: composite
  steps:
  - name: Restore Maven packages cache
    uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
    with:
      path: ~/.m2/repository
      key: ${{ runner.os }}-mvn-build-${{ inputs.spark_version }}-${{ inputs.scala_version }}-${{ hashFiles('pom.xml') }}
      restore-keys:
        ${{ runner.os }}-mvn-build-${{ inputs.spark_version }}-${{ inputs.scala_version }}-${{ hashFiles('pom.xml') }}
        ${{ runner.os }}-mvn-build-${{ inputs.spark_version }}-${{ inputs.scala_version }}-
  
  - name: Setup JDK
    uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
    with:
      java-version: ${{ inputs.java_version }}
      distribution: 'zulu'

  - name: Set target versions in environment
    run: |
      # Pass the inputs into the environment so init.sh can pick them up
      echo "SPARK_VERSION=${{ inputs.spark_version }}" >> $GITHUB_ENV
      echo "SCALA_VERSION=${{ inputs.scala_version }}" >> $GITHUB_ENV
    shell: bash

  - name: Fetch mvn dependencies
    continue-on-error: true
    run: |
      # Source init.sh to calculate SPARK_BIN_VERSION, SCALA_BIN_VERSION, and MAVEN_PROFILES
      source ./scripts/init.sh
      echo "::group::mvn go-offline"
      mvn --batch-mode --update-snapshots dependency:go-offline -P$MAVEN_PROFILES
      echo "::endgroup::"
    shell: bash

  - name: Build package
    run: |
      # Source init.sh again for this new shell process
      source ./scripts/init.sh
      echo "::group::mvn install"
      mvn --batch-mode install -P$MAVEN_PROFILES
      echo "::endgroup::"
    shell: bash

  - name: Build image
    if: ( ! contains(inputs.spark_version, '-SNAPSHOT') )
    env:
      JAVA_VERSION: ${{ inputs.java_version }}
    run: |
      echo "::group::createImage.sh"
      # createImage.sh runs init.sh internally, so variables will be configured properly
      ./scripts/createImage.sh
      echo "::endgroup::"
    shell: bash