name: Build
author: EnricoMi
description: Github Action to build this project against a Spark and Scala version

inputs:
  spark_version:
    description: Spark version to build against, e.g. "3.5.5" or "4.1.0-SNAPSHOT"
    required: true
  scala_version:
    description: Scala version to build with, e.g. "2.13.8"
    required: true
  java_version:
    description: Java version to build with, e.g. "11"
    required: true

runs:
  using: composite
  steps:
  - name: Restore Maven packages cache
    uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
    with:
      path: ~/.m2/repository
      key: ${{ runner.os }}-mvn-build-${{ inputs.spark_version }}-${{ inputs.scala_version }}-${{ hashFiles('pom.xml') }}
      restore-keys:
        ${{ runner.os }}-mvn-build-${{ inputs.spark_version }}-${{ inputs.scala_version }}-${{ hashFiles('pom.xml') }}
        ${{ runner.os }}-mvn-build-${{ inputs.spark_version }}-${{ inputs.scala_version }}-
  - name: Setup JDK
    uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
    with:
      java-version: ${{ inputs.java_version }}
      distribution: 'zulu'

  - name: Set Spark and Scala versions
    run: |
      SPARK_VER="${{ inputs.spark_version }}"
      SCALA_VER="${{ inputs.scala_version }}"
      
      # Compute the short binary versions (ex: 4.1.1 -> 4.1)
      SPARK_BIN=$(echo "$SPARK_VER" | cut -d. -f1-2)
      SCALA_BIN=$(echo "$SCALA_VER" | cut -d. -f1-2)
      
      # Map the Spark version to an exact profile defined in pom.xml
      if [[ "$SPARK_VER" == 3.3.* ]]; then
        SPARK_PROFILE="spark3.3.4"
      elif [[ "$SPARK_VER" == 3.5.* ]]; then
        SPARK_PROFILE="spark3.5.5"
      elif [[ "$SPARK_VER" == 4.1.* ]]; then
        SPARK_PROFILE="spark4.1.1"
      else
        SPARK_PROFILE="spark${SPARK_VER}"
      fi

      # Map the Scala version to an exact profile defined in pom.xml
      if [[ "$SCALA_BIN" == "2.12" ]]; then
        SCALA_PROFILE="scala2.12"
      elif [[ "$SCALA_BIN" == "2.13" ]]; then
        # Select the correct 2.13 profile based on the target Spark generation
        if [[ "$SPARK_VER" == 4.* ]]; then
          SCALA_PROFILE="scala2.13.17"
        else
          SCALA_PROFILE="scala2.13.8"
        fi
      else
        SCALA_PROFILE="scala${SCALA_VER}"
      fi
      
      # Export everything to the global GitHub Actions environment
      echo "MAVEN_PROFILES=${SPARK_PROFILE},${SCALA_PROFILE}" >> $GITHUB_ENV
      echo "SPARK_VERSION=${SPARK_VER}" >> $GITHUB_ENV
      echo "SPARK_BIN_VERSION=${SPARK_BIN}" >> $GITHUB_ENV
      echo "SCALA_VERSION=${SCALA_VER}" >> $GITHUB_ENV
      echo "SCALA_BIN_VERSION=${SCALA_BIN}" >> $GITHUB_ENV
    shell: bash
  - name: Fetch mvn dependencies
    continue-on-error: true
    run: |
      # Fetch mvn dependencies
      echo "::group::mvn go-offline"
      mvn --batch-mode --update-snapshots dependency:go-offline -P$MAVEN_PROFILES
      echo "::endgroup::"
    shell: bash
  - name: Build package
    run: |
      # Build package
      echo "::group::mvn install"
      mvn --batch-mode install -P$MAVEN_PROFILES
      echo "::endgroup::"
    shell: bash

  - name: Build image
    if: ( ! contains(inputs.spark_version, '-SNAPSHOT') )
    env:
      JAVA_VERSION: ${{ inputs.java_version }}
    run: |
      # Build image
      echo "::group::createImage.sh"
      ./scripts/createImage.sh
      echo "::endgroup::"
    shell: bash
